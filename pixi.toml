[workspace]
authors = ["Allen Guo <guosonglin001@gmail.com>"]
channels = ["conda-forge"]
name = "tbgpu"
platforms = ["osx-arm64"]
version = "0.1.0"

[tasks]

[dependencies]
python = "==3.13"
uv = ">=0.11.7,<0.12"
ruff = ">=0.15.11,<0.16"
ty = ">=0.0.31,<0.0.32"
