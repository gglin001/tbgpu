[workspace]
authors = ["Allen Guo <guosonglin001@gmail.com>"]
channels = ["conda-forge"]
name = "tbgpu"
platforms = ["osx-arm64"]
version = "0.1.0"

[tasks]

[dependencies]
python = "==3.13"
uv = ">=0.11.7,<0.12"
ruff = ">=0.15.11,<0.16"
ty = ">=0.0.31,<0.0.32"
hatchling = ">=1.29.0,<2"

pre-commit = ">=4.5.1,<5"
pytest = ">=9.0.3,<10"

libusb = ">=1.0.29,<2"
pyftdi = ">=0.55.4,<0.56"

pytorch = ">=2.10.0,<3"
pybind11 = ">=3.0.1,<4"
pybind11-global = ">=3.0.1,<4"

transformers = ">=5.5.4,<6"
huggingface_hub = ">=1.11.0,<2"
modelscope = ">=1.35.4,<2"

[activation.env]

LIBUSB_PATH = "${PIXI_PROJECT_ROOT}/.pixi/envs/default/lib/libusb-1.0.0.dylib"
